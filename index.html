<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Cost Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">Material Cost Dashboard</h2>
    
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
            <label for="csvFileInput" class="form-label fw-bold text-primary">1. Upload your ACCL.csv file here:</label>
            <input type="file" id="csvFileInput" accept=".csv" class="form-control mb-3">
            
            <label for="itemSelector" class="form-label fw-bold text-success">2. Select Material to View:</label>
            <select id="itemSelector" class="form-select w-25" disabled>
                <option value="Clinker">Clinker</option>
                <option value="Slag">Slag</option>
                <option value="Grinding Aid">Grinding Aid</option>
                <option value="Gypsum">Gypsum</option>
                <option value="Fly Ash">Fly Ash</option>
                <option value="Limestone">Limestone</option>
            </select>
        </div>

        <div class="card-body">
            <div style="height: 400px; position: relative;">
                <canvas id="cogsVsBudgetChart"></canvas>
            </div>
            <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>
</div>

<script>
    let myChart = null;
    let globalCsvData = null; // Stores the uploaded file data
    const months = ['Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];

    // 1. Initialize empty chart
    function initChart() {
        const ctx = document.getElementById('cogsVsBudgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    {
                        label: 'COGS 2025-26',
                        data: [],
                        borderColor: '#4285F4', backgroundColor: '#4285F4',
                        borderWidth: 2, pointRadius: 0, pointHoverRadius: 6, tension: 0, fill: false
                    },
                    {
                        label: 'Budget 2025-26',
                        data: [],
                        borderColor: '#EA4335', backgroundColor: '#EA4335',
                        borderWidth: 2, pointRadius: 0, pointHoverRadius: 6, tension: 0, fill: false
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    title: { display: true, text: 'COGS 2025-26 vs Budget 2025-26', font: { size: 16, weight: 'normal' } },
                    legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } }
                },
                scales: {
                    y: { min: 0, suggestedMax: 10000 },
                    x: { title: { display: true, text: 'Upload a file to begin' }, grid: { display: false } }
                }
            }
        });
    }

    // 2. Listen for the user uploading the CSV
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            complete: function(results) {
                globalCsvData = results.data;
                // Enable the dropdown now that we have data
                const selector = document.getElementById('itemSelector');
                selector.disabled = false;
                
                // Draw the chart for the currently selected item
                updateChart(selector.value);
            }
        });
    });

    // 3. Listen for dropdown changes
    document.getElementById('itemSelector').addEventListener('change', function(e) {
        if (globalCsvData) {
            updateChart(e.target.value);
        }
    });

    // 4. Find data and update chart
    function updateChart(itemName) {
        let foundRow = -1;
        let foundCol = -1;

        // Search for the item (e.g., "Clinker")
        for (let r = 0; r < globalCsvData.length; r++) {
            for (let c = 0; c < globalCsvData[r].length; c++) {
                if (globalCsvData[r][c] && globalCsvData[r][c].toString().trim().toLowerCase() === itemName.toLowerCase()) {
                    foundRow = r; foundCol = c; break;
                }
            }
            if (foundRow !== -1) break;
        }

        const errorDiv = document.getElementById('errorMessage');
        if (foundRow === -1) {
            errorDiv.textContent = `Could not find "${itemName}" in the CSV.`;
            errorDiv.classList.remove('d-none');
            return;
        } else {
            errorDiv.classList.add('d-none');
        }

        let cogsData = [];
        let budgetData = [];

        // Scan below the item for COGS and Budget
        for (let r = foundRow + 1; r < Math.min(foundRow + 15, globalCsvData.length); r++) {
            let rowLabel = globalCsvData[r][foundCol] ? globalCsvData[r][foundCol].toString().trim() : "";
            
            if (rowLabel === "COGS 2025-26") {
                cogsData = globalCsvData[r].slice(foundCol + 1, foundCol + 13).map(val => parseFloat(val.toString().replace(/,/g, '')) || 0);
            }
            if (rowLabel === "Budget 2025-26") {
                budgetData = globalCsvData[r].slice(foundCol + 1, foundCol + 13).map(val => parseFloat(val.toString().replace(/,/g, '')) || 0);
            }
        }

        // Update the chart visual
        myChart.data.datasets[0].data = cogsData;
        myChart.data.datasets[1].data = budgetData;
        myChart.options.scales.x.title.text = itemName;
        myChart.update();
    }

    // Run when page loads
    window.onload = initChart;
</script>

</body>
</html>
