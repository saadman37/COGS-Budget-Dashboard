<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGS vs Budget Dashboard</title>
    <!-- Bootstrap CSS for layout and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">Material Cost Dashboard</h2>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <!-- Dropdown for future expansion (Clinker, Slag, etc.) -->
            <div class="mb-3 w-25">
                <select id="itemSelector" class="form-select">
                    <option value="clinker">Clinker</option>
                    <option value="slag">Slag</option>
                </select>
            </div>

            <!-- Chart Container -->
            <div style="height: 400px; position: relative;">
                <canvas id="cogsVsBudgetChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Exact Data from "COGS report ARL _FP.xlsx" for Clinker
    const months = ['Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    
    const clinkerCOGS = [7682.92, 7803.36, 7552.92, 7393.2, 7162.04, 6950.84, 7136.23, 7110.14, 7074.9, 7765.07, 8700.44, 8445.00];
    const clinkerBudget = [6934.19, 7534.22, 7534.22, 7534.22, 7718.72, 7718.72, 7718.72, 7841.72, 7841.72, 7472.72, 7472.72, 7472.72];

    const ctx = document.getElementById('cogsVsBudgetChart').getContext('2d');
    
    // 2. Chart Configuration matching your image
    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: months,
            datasets: [
                {
                    label: 'COGS 2025-26',
                    data: clinkerCOGS,
                    borderColor: '#4285F4', // Match the blue from image
                    backgroundColor: '#4285F4',
                    borderWidth: 2,
                    pointRadius: 0, // Removes the dots on the line
                    pointHoverRadius: 6,
                    tension: 0, // Makes the lines completely straight
                    fill: false
                },
                {
                    label: 'Budget 2025-26',
                    data: clinkerBudget,
                    borderColor: '#EA4335', // Match the red from image
                    backgroundColor: '#EA4335',
                    borderWidth: 2,
                    pointRadius: 0, 
                    pointHoverRadius: 6,
                    tension: 0, 
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'COGS 2025-26 and Budget 2025-26',
                    font: { size: 16, weight: 'normal', color: '#666' }
                },
                legend: {
                    position: 'right', // Moves the legend to the right side
                    labels: {
                        usePointStyle: true,
                        boxWidth: 8
                    }
                }
            },
            scales: {
                y: {
                    min: 0,
                    max: 10000,
                    ticks: {
                        stepSize: 1000 // Sets the 0, 1000, 2000 intervals
                    }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Clinker'
                    },
                    grid: {
                        display: false // Removes vertical lines behind the chart
                    }
                }
            }
        }
    });
</script>

</body>
</html>
